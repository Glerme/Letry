<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logo Letry</title>
  <desc id="desc">Letra L em estilo neon com brilho ciano e magenta.</desc>
  <defs>
    <linearGradient id="neon" x1="28" y1="18" x2="102" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#57F4FF"/>
      <stop offset="0.55" stop-color="#00E9FF"/>
      <stop offset="1" stop-color="#FF4BD1"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="128" height="128" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path d="M34 20V96H94" stroke="url(#neon)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <path d="M34 20V96H94" stroke="#ECFDFF" stroke-opacity="0.85" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
